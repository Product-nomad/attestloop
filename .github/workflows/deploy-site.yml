name: Deploy site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Type-check
        run: pnpm check

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-message MUST be passed explicitly. Without it,
          # wrangler auto-fills from `git log -1`, which sends the full
          # multi-line message to Cloudflare's API. Their validator
          # rejects messages with certain content (newlines, hex
          # sequences, etc.) as "Invalid commit message, must be a
          # valid UTF-8 string [code: 8000111]" — which has bitten
          # several deploys. A fixed short message keeps the deploy
          # idempotent regardless of what's in the git body; the
          # commit hash still identifies the deploy.
          command: pages deploy dist --project-name=attestloop --branch=main --commit-hash=${{ github.sha }} --commit-message="site deploy ${{ github.sha }}"
          workingDirectory: site
